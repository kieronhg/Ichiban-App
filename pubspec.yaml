name: ichiban_app
description: Ichiban Dojo Management Application
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0

  # State management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Routing
  go_router: ^17.2.1

  # Payments
  flutter_stripe: ^12.6.0
  pay: ^3.3.0

  # Security / local storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.3.2
  crypto: ^3.0.3

  # Utilities
  equatable: ^2.0.5
  uuid: ^4.4.2
  intl: ^0.20.2
  collection: ^1.18.0

  # File handling / CSV / sharing
  file_picker: ^8.1.0
  csv: ^6.0.0
  path_provider: ^2.1.5
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
